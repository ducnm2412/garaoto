<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập vào GaraOto — Hệ thống quản lý gara ô tô">
    <title>Đăng nhập — GaraOto</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="auth-page">
            <div class="auth-container">
                <div class="auth-card">
                    <!-- Header -->
                    <div class="auth-header">
                        <a href="/" class="auth-logo">
                            <i class="fa-solid fa-car-side"></i>
                            GaraOto
                        </a>
                        <h1>Đăng nhập</h1>
                        <p>Chào mừng bạn quay lại! Đăng nhập để tiếp tục.</p>
                    </div>

                    <!-- Body -->
                    <div class="auth-body">
                        <!-- Alert -->
                        <div class="auth-alert" id="auth-alert">
                            <i class="fa-solid fa-circle-info"></i>
                            <span id="alert-message"></span>
                        </div>

                        <!-- Login Form -->
                        <form id="login-form" novalidate>
                            <div class="form-group">
                                <label class="form-label" for="email">
                                    Email <span class="required">*</span>
                                </label>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email"
                                    class="form-control" 
                                    placeholder="Nhập email của bạn"
                                    required
                                    autocomplete="email"
                                >
                                <div class="form-error" id="email-error"></div>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="password">
                                    Mật khẩu <span class="required">*</span>
                                </label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        id="password" 
                                        name="matKhau"
                                        class="form-control" 
                                        placeholder="Nhập mật khẩu"
                                        required
                                        autocomplete="current-password"
                                    >
                                    <button type="button" class="password-toggle" id="password-toggle">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                                <div class="form-error" id="password-error"></div>
                            </div>

                            <div class="auth-options">
                                <label class="remember-me">
                                    <input type="checkbox" id="remember-me">
                                    Ghi nhớ đăng nhập
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">
                                <i class="fa-solid fa-right-to-bracket"></i>
                                Đăng nhập
                            </button>
                        </form>

                        <!-- Forgot Password -->
                        <div class="forgot-password-section">
                            <a href="/pages/auth/forgot-password.html" class="forgot-password-link" id="forgot-password-link">Quên mật khẩu</a>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="auth-footer">
                        Chưa có tài khoản? <a href="/pages/auth/register.html">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- JS -->
    <script type="module">
        import Components from '/js/components.js';
        import Guard from '/js/guard.js';
        import Auth from '/js/auth.js';
        import Api from '/js/api.js';
        import Toast from '/js/toast.js';
        import Utils from '/js/utils.js';

        // Load shared components
        await Components.loadHeader();
        await Components.loadFooter();

        // If already logged in, redirect to home
        Guard.guestOnly();

        // --- Elements ---
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const alertBox = document.getElementById('auth-alert');
        const alertMessage = document.getElementById('alert-message');
        const passwordToggle = document.getElementById('password-toggle');

        // --- Password toggle ---
        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            passwordToggle.querySelector('i').className = 
                type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        });

        // --- Show alert ---
        function showAlert(message, type = 'error') {
            alertBox.className = `auth-alert show alert-${type}`;
            alertBox.querySelector('i').className = type === 'error' 
                ? 'fa-solid fa-circle-xmark' 
                : 'fa-solid fa-circle-check';
            alertMessage.textContent = message;
        }

        function hideAlert() {
            alertBox.className = 'auth-alert';
        }

        // --- Validate ---
        function validate() {
            let valid = true;
            hideAlert();

            // Email
            const emailError = document.getElementById('email-error');
            if (!emailInput.value.trim()) {
                emailInput.classList.add('error');
                emailError.textContent = 'Email không được để trống';
                emailError.classList.add('show');
                valid = false;
            } else if (!Utils.isValidEmail(emailInput.value.trim())) {
                emailInput.classList.add('error');
                emailError.textContent = 'Email không đúng định dạng';
                emailError.classList.add('show');
                valid = false;
            } else {
                emailInput.classList.remove('error');
                emailError.classList.remove('show');
            }

            // Password
            const passError = document.getElementById('password-error');
            if (!passwordInput.value) {
                passwordInput.classList.add('error');
                passError.textContent = 'Mật khẩu không được để trống';
                passError.classList.add('show');
                valid = false;
            } else {
                passwordInput.classList.remove('error');
                passError.classList.remove('show');
            }

            return valid;
        }

        // --- Clear errors on input ---
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
            document.getElementById('email-error').classList.remove('show');
            hideAlert();
        });
        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
            document.getElementById('password-error').classList.remove('show');
            hideAlert();
        });

        // --- Submit ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validate()) return;

            loginBtn.classList.add('btn-loading');
            loginBtn.disabled = true;

            try {
                const result = await Api.post('/auth/login', {
                    email: emailInput.value.trim(),
                    matKhau: passwordInput.value,
                });

                // Backend wraps in ApiResponse: { success, message, data: { token, hoTen, email, vaiTro, ... } }
                const authData = result.data || result;

                // Save auth
                Auth.saveAuth(authData.token, {
                    maNguoiDung: authData.maNguoiDung,
                    hoTen: authData.hoTen,
                    email: authData.email,
                    vaiTro: authData.vaiTro,
                });

                Toast.success('Đăng nhập thành công!');

                // Redirect
                const returnUrl = Utils.getUrlParam('returnUrl');
                setTimeout(() => {
                    window.location.href = returnUrl ? decodeURIComponent(returnUrl) : '/';
                }, 500);

            } catch (err) {
                showAlert(err.message || 'Email hoặc mật khẩu không chính xác');
            } finally {
                loginBtn.classList.remove('btn-loading');
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
