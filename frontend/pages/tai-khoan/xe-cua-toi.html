<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xe của tôi — GaraOto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/tai-khoan.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="main-content">
        <div class="container">
            <div class="account-layout">
                <aside class="account-sidebar" id="account-sidebar"></aside>
                <div class="account-main">
                    <div class="page-title-bar">
                        <h2><i class="fa-solid fa-car"></i> Xe của tôi</h2>
                        <button class="btn btn-primary" id="btn-add-xe">
                            <i class="fa-solid fa-plus"></i> Thêm xe
                        </button>
                    </div>

                    <div class="item-list" id="xe-list">
                        <div class="empty-state">
                            <i class="fa-solid fa-car-side"></i>
                            <h3>Chưa có xe nào</h3>
                            <p>Thêm xe để đặt lịch sửa chữa</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal thêm/sửa xe -->
    <div class="modal-overlay" id="xe-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Thêm xe mới</h3>
                <button class="modal-close" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="xe-form" novalidate>
                    <input type="hidden" id="xe-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Biển số <span class="required">*</span></label>
                            <input type="text" id="bienSo" class="form-control" placeholder="51A-12345" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hãng xe</label>
                            <input type="text" id="hangXe" class="form-control" placeholder="Toyota, Honda...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Dòng xe</label>
                            <input type="text" id="dongXe" class="form-control" placeholder="Vios, City...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Năm SX</label>
                            <input type="number" id="namSanXuat" class="form-control" placeholder="2024">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Màu sắc</label>
                            <input type="text" id="mauSac" class="form-control" placeholder="Trắng, Đen...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số khung</label>
                            <input type="text" id="soKhung" class="form-control" placeholder="Số khung xe">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Số máy</label>
                        <input type="text" id="soMay" class="form-control" placeholder="Số máy xe">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="modal-cancel">Hủy</button>
                <button class="btn btn-primary" id="modal-save">
                    <i class="fa-solid fa-floppy-disk"></i> Lưu
                </button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import Components from '/js/components.js';
        import Guard from '/js/guard.js';
        import Auth from '/js/auth.js';
        import Api from '/js/api.js';
        import Utils from '/js/utils.js';
        import Toast from '/js/toast.js';

        if (!Guard.requireAuth()) throw new Error('redirect');
        await Components.loadHeader();
        await Components.loadFooter();

        // Sidebar — reuse pattern
        const user = Auth.getUser();
        loadSidebar();
        loadXeList();

        const modal = document.getElementById('xe-modal');
        const form = document.getElementById('xe-form');

        // Open modal
        document.getElementById('btn-add-xe').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Thêm xe mới';
            document.getElementById('xe-id').value = '';
            form.reset();
            modal.classList.add('show');
        });

        // Close modal
        document.getElementById('modal-close').addEventListener('click', () => modal.classList.remove('show'));
        document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('show'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

        // Save
        document.getElementById('modal-save').addEventListener('click', async () => {
            const bienSo = document.getElementById('bienSo').value.trim();
            if (!bienSo) { Toast.warning('Vui lòng nhập biển số xe'); return; }

            const saveBtn = document.getElementById('modal-save');
            saveBtn.classList.add('btn-loading');
            saveBtn.disabled = true;

            const body = {
                maNguoiDung: user.maNguoiDung || user.id, // Sửa tên biến cho đúng với DTO XeKhachHangRequest ('maNguoiDung' thay vì 'maKhachHang')
                bienSo,
                hangXe: document.getElementById('hangXe').value.trim() || null,
                dongXe: document.getElementById('dongXe').value.trim() || null,
                namSanXuat: document.getElementById('namSanXuat').value ? parseInt(document.getElementById('namSanXuat').value) : null,
                mauSac: document.getElementById('mauSac').value.trim() || null,
                soKhung: document.getElementById('soKhung').value.trim() || null,
                soMay: document.getElementById('soMay').value.trim() || null,
            };

            try {
                const xeId = document.getElementById('xe-id').value;
                if (xeId) {
                    await Api.put(`/xe-khach-hang/${xeId}`, body);
                    Toast.success('Cập nhật xe thành công!');
                } else {
                    await Api.post('/xe-khach-hang', body);
                    Toast.success('Thêm xe thành công!');
                }
                modal.classList.remove('show');
                loadXeList();
            } catch (err) {
                Toast.error(err.message || 'Lỗi khi lưu xe');
            } finally {
                saveBtn.classList.remove('btn-loading');
                saveBtn.disabled = false;
            }
        });

        async function loadXeList() {
            const container = document.getElementById('xe-list');
            try {
                const result = await Api.get(`/xe-khach-hang/khach-hang/${user.maNguoiDung}`);
                const list = Array.isArray(result) ? result : (result?.data || []);

                if (list.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-car-side"></i><h3>Chưa có xe nào</h3><p>Thêm xe để đặt lịch sửa chữa</p></div>`;
                    return;
                }

                container.innerHTML = list.map(xe => `
                    <div class="item-row">
                        <div class="item-info">
                            <div class="item-icon" style="background: var(--primary-100); color: var(--primary-600);">
                                <i class="fa-solid fa-car"></i>
                            </div>
                            <div class="item-details">
                                <h4>${xe.hangXe || ''} ${xe.dongXe || ''} ${!xe.hangXe && !xe.dongXe ? xe.bienSo : ''}</h4>
                                <p>Biển số: ${xe.bienSo} · Năm: ${xe.namSanXuat || '—'} · Màu: ${xe.mauSac || '—'}</p>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-ghost btn-sm btn-edit-xe" data-xe='${JSON.stringify(xe)}'>
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

                // Edit buttons
                container.querySelectorAll('.btn-edit-xe').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const xe = JSON.parse(btn.dataset.xe);
                        document.getElementById('modal-title').textContent = 'Sửa thông tin xe';
                        document.getElementById('xe-id').value = xe.maXeKh;
                        document.getElementById('bienSo').value = xe.bienSo || '';
                        document.getElementById('hangXe').value = xe.hangXe || '';
                        document.getElementById('dongXe').value = xe.dongXe || '';
                        document.getElementById('namSanXuat').value = xe.namSanXuat || '';
                        document.getElementById('mauSac').value = xe.mauSac || '';
                        document.getElementById('soKhung').value = xe.soKhung || '';
                        document.getElementById('soMay').value = xe.soMay || '';
                        modal.classList.add('show');
                    });
                });
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-car-side"></i><h3>Chưa có xe nào</h3><p>Thêm xe để đặt lịch sửa chữa</p></div>`;
            }
        }

        function loadSidebar() {
            const sidebar = document.getElementById('account-sidebar');
            const initials = Auth.getUserInitials();
            const name = Auth.getUserName();
            const email = user?.email || '';
            const currentPage = window.location.pathname.split('/').pop();
            const links = [
                { href: '/pages/tai-khoan/index.html', icon: 'fa-gauge-high', label: 'Dashboard', page: 'index.html' },
                { href: '/pages/tai-khoan/cap-nhat.html', icon: 'fa-user-pen', label: 'Thông tin cá nhân', page: 'cap-nhat.html' },
                { href: '/pages/tai-khoan/xe-cua-toi.html', icon: 'fa-car', label: 'Xe của tôi', page: 'xe-cua-toi.html' },
                { href: '/pages/tai-khoan/lich-hen.html', icon: 'fa-calendar-check', label: 'Lịch hẹn', page: 'lich-hen.html' },
                { href: '/pages/tai-khoan/don-thue.html', icon: 'fa-file-contract', label: 'Đơn thuê xe', page: 'don-thue.html' },
            ];
            sidebar.innerHTML = `
                <div class="sidebar-user-info"><div class="sidebar-avatar">${initials}</div><div class="sidebar-user-name">${name}</div><div class="sidebar-user-email">${email}</div></div>
                <nav class="sidebar-nav">${links.map(l => `<a href="${l.href}" class="${currentPage === l.page ? 'active' : ''}"><i class="fa-solid ${l.icon}"></i> ${l.label}</a>`).join('')}</nav>`;
        }
    </script>
</body>
</html>
