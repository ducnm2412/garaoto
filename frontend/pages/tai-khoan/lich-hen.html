<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch hẹn sửa xe — GaraOto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/tai-khoan.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="main-content">
        <div class="container">
            <div class="account-layout">
                <aside class="account-sidebar" id="account-sidebar"></aside>
                <div class="account-main">
                    <div class="page-title-bar">
                        <h2><i class="fa-solid fa-calendar-check"></i> Lịch hẹn sửa xe</h2>
                        <a href="/pages/dat-lich/index.html" class="btn btn-primary">
                            <i class="fa-solid fa-plus"></i> Đặt lịch mới
                        </a>
                    </div>

                    <!-- Filter tabs -->
                    <div class="tabs" id="status-tabs">
                        <button class="tab-btn active" data-status="all">Tất cả</button>
                        <button class="tab-btn" data-status="ChoXacNhan">Chờ xác nhận</button>
                        <button class="tab-btn" data-status="DaXacNhan">Đã xác nhận</button>
                        <button class="tab-btn" data-status="HoanThanh">Hoàn thành</button>
                        <button class="tab-btn" data-status="DaHuy">Đã hủy</button>
                    </div>

                    <div class="item-list" id="lichhen-list">
                        <div class="empty-state">
                            <i class="fa-solid fa-calendar"></i>
                            <h3>Chưa có lịch hẹn</h3>
                            <p>Đặt lịch sửa xe ngay để được phục vụ tốt nhất</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Đánh Giá Modal -->
    <div class="modal-overlay" id="rating-modal">
        <div class="modal" style="max-width: 450px; border-radius: var(--radius-lg); text-align: center; border-top: 4px solid var(--primary-500); padding: 2rem; position: relative;">
            <button class="btn-icon" onclick="closeRatingModal()" style="position: absolute; right: 10px; top: 10px;"><i class="fa-solid fa-times"></i></button>
            <div style="font-size: 3rem; color: var(--warning-500); margin-bottom: 1rem;">
                <i class="fa-solid fa-star"></i>
            </div>
            <h3 style="margin-bottom: 0.5rem">Đánh giá dịch vụ</h3>
            <p style="color: var(--gray-600); margin-bottom: 1.5rem">Bạn cảm thấy dịch vụ của chúng tôi thế nào?</p>
            
            <form id="rating-form">
                <input type="hidden" id="inp-rt-loaiDichVu" value="">
                <input type="hidden" id="inp-rt-maThamChieu" value="">
                
                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Mức độ hài lòng: <span style="color:var(--danger-500)">*</span></label>
                    <select id="inp-rt-soSao" class="form-control" required style="width: 100%; border: 1px solid var(--gray-300); border-radius: var(--radius-md); padding: 10px; font-weight: bold; color: var(--warning-600);">
                        <option value="5">⭐⭐⭐⭐⭐ 5 Sao - Xuất sắc</option>
                        <option value="4">⭐⭐⭐⭐ 4 Sao - Rất tốt</option>
                        <option value="3">⭐⭐⭐ 3 Sao - Tạm được</option>
                        <option value="2">⭐⭐ 2 Sao - Chưa hài lòng</option>
                        <option value="1">⭐ 1 Sao - Quá tệ</option>
                    </select>
                </div>
                
                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <textarea id="inp-rt-noiDung" class="form-control" rows="3" placeholder="Chia sẻ trải nghiệm của bạn (không bắt buộc)..." style="width: 100%; border: 1px solid var(--gray-300); border-radius: var(--radius-md); padding: 10px;"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Gửi Đánh Giá</button>
            </form>
        </div>
    </div>
    
    <div id="footer-placeholder"></div>

    <script type="module">
        import Components from '/js/components.js';
        import Guard from '/js/guard.js';
        import Auth from '/js/auth.js';
        import Api from '/js/api.js';
        import Toast from '/js/toast.js';
        import Utils from '/js/utils.js';

        if (!Guard.requireAuth()) throw new Error('redirect');
        await Components.loadHeader();
        await Components.loadFooter();

        const user = Auth.getUser();
        loadSidebar();

        let allLichHen = [];
        let ratedLichHenIds = [];

        // Load data
        async function loadData() {
            const container = document.getElementById('lichhen-list');
            try {
                try {
                    const reviewsRes = await Api.get('/danh-gia/khach-hang/' + user.maNguoiDung);
                    const listReviews = Array.isArray(reviewsRes) ? reviewsRes : (reviewsRes?.data || []);
                    ratedLichHenIds = listReviews.filter(r => r.loaiDichVu === 'SUA_CHUA').map(r => r.maThamChieu);
                } catch(e) {}

                const result = await Api.get(`/lich-hen-sua-chua/khach-hang/${user.maNguoiDung}`);
                allLichHen = Array.isArray(result) ? result : (result?.data || []);
                renderList(allLichHen);
            } catch {
                allLichHen = [];
                renderList([]);
            }
        }

        function renderList(list) {
            const container = document.getElementById('lichhen-list');
            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-calendar"></i><h3>Không có lịch hẹn</h3><p>Đặt lịch sửa xe ngay</p></div>`;
                return;
            }

            container.innerHTML = list.map(lh => `
                <div class="item-row">
                    <div class="item-info">
                        <div class="item-icon" style="background: var(--success-light); color: var(--success);">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <div class="item-details">
                            <h4>Lịch hẹn #${lh.maLichHen}</h4>
                            <p>
                                <i class="fa-solid fa-clock" style="color: var(--gray-400);"></i> ${Utils.formatDate(lh.ngayHen)} ${lh.gioHen ? '· ' + lh.gioHen : ''}
                                ${lh.xeKhachHang ? ` · <i class="fa-solid fa-car" style="color: var(--gray-400);"></i> ${lh.xeKhachHang.bienSo}` : ''}
                            </p>
                            ${lh.moTaLoi ? `<p style="margin-top: 4px;"><i class="fa-solid fa-note-sticky" style="color: var(--gray-400);"></i> ${Utils.truncate(lh.moTaLoi, 80)}</p>` : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        ${Utils.getStatusBadge(lh.trangThai)}
                        ${lh.trangThai === 'HoanThanh' ? (ratedLichHenIds.includes(lh.maLichHen) ? `<button class="btn btn-outline btn-sm" style="margin-top: 10px; color: var(--gray-500); border-color: var(--gray-300); display: block;" disabled><i class="fa-solid fa-check"></i> Đã đánh giá</button>` : `<button class="btn btn-outline btn-sm" style="margin-top: 10px; color: var(--warning-600); border-color: var(--warning-300); display: block;" onclick="openRatingModal('SUA_CHUA', ${lh.maLichHen})"><i class="fa-solid fa-star"></i> Đánh giá</button>`) : ''}
                    </div>
                </div>
            `).join('');
        }

        // Tab filter
        document.getElementById('status-tabs').addEventListener('click', (e) => {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const status = btn.dataset.status;
            if (status === 'all') {
                renderList(allLichHen);
            } else {
                renderList(allLichHen.filter(lh => lh.trangThai === status));
            }
        });

        loadData();

        window.openRatingModal = async function(loaiDichVu, maThamChieu) {
            try {
                const res = await Api.get(`/danh-gia/check?loaiDichVu=${loaiDichVu}&maThamChieu=${maThamChieu}`);
                if (res?.data) {
                    Toast.info("Bạn đã đánh giá dịch vụ này rồi!");
                    return;
                }
            } catch (err) {}
            
            document.getElementById('inp-rt-loaiDichVu').value = loaiDichVu;
            document.getElementById('inp-rt-maThamChieu').value = maThamChieu;
            document.getElementById('inp-rt-noiDung').value = '';
            document.getElementById('inp-rt-soSao').value = '5'; // default
            document.getElementById('rating-modal').classList.add('show');
        }
        window.closeRatingModal = () => document.getElementById('rating-modal').classList.remove('show');
        
        document.getElementById('rating-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                await Api.post('/danh-gia', {
                    maNguoiDung: user.maNguoiDung,
                    loaiDichVu: document.getElementById('inp-rt-loaiDichVu').value,
                    maThamChieu: parseInt(document.getElementById('inp-rt-maThamChieu').value),
                    soSao: parseInt(document.getElementById('inp-rt-soSao').value),
                    noiDung: document.getElementById('inp-rt-noiDung').value
                });
                Toast.success("Cảm ơn bạn đã gửi đánh giá!");
                closeRatingModal();
                ratedLichHenIds.push(parseInt(document.getElementById('inp-rt-maThamChieu').value));
                // Lấy tab hiện tại
                const activeTab = document.querySelector('#status-tabs .active').dataset.status;
                if (activeTab === 'all') renderList(allLichHen);
                else renderList(allLichHen.filter(lh => lh.trangThai === activeTab));
            } catch (err) {
                Toast.error("Thất bại: " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        function loadSidebar() {
            const sidebar = document.getElementById('account-sidebar');
            const initials = Auth.getUserInitials();
            const name = Auth.getUserName();
            const email = user?.email || '';
            const currentPage = window.location.pathname.split('/').pop();
            const links = [
                { href: '/pages/tai-khoan/index.html', icon: 'fa-gauge-high', label: 'Dashboard', page: 'index.html' },
                { href: '/pages/tai-khoan/cap-nhat.html', icon: 'fa-user-pen', label: 'Thông tin cá nhân', page: 'cap-nhat.html' },
                { href: '/pages/tai-khoan/xe-cua-toi.html', icon: 'fa-car', label: 'Xe của tôi', page: 'xe-cua-toi.html' },
                { href: '/pages/tai-khoan/lich-hen.html', icon: 'fa-calendar-check', label: 'Lịch hẹn', page: 'lich-hen.html' },
                { href: '/pages/tai-khoan/don-thue.html', icon: 'fa-file-contract', label: 'Đơn thuê xe', page: 'don-thue.html' },
            ];
            sidebar.innerHTML = `
                <div class="sidebar-user-info"><div class="sidebar-avatar">${initials}</div><div class="sidebar-user-name">${name}</div><div class="sidebar-user-email">${email}</div></div>
                <nav class="sidebar-nav">${links.map(l => `<a href="${l.href}" class="${currentPage === l.page ? 'active' : ''}"><i class="fa-solid ${l.icon}"></i> ${l.label}</a>`).join('')}</nav>`;
        }
    </script>
</body>
</html>
