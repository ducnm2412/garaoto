<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Gara Xe Việt</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/dashboard.css" />

    <script src="js/utils/auth.js"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <h2><i class="fas fa-car-side"></i> GARA ADMIN</h2>
        </div>

        <ul class="sidebar-menu">
          <li class="menu-item active">
            <a href="#"><i class="fas fa-chart-line"></i> Tổng quan</a>
          </li>
          <li class="menu-item">
            <a href="#"><i class="fas fa-car"></i> Quản lý Phương tiện</a>
          </li>
          <li class="menu-item">
            <a href="#"
              ><i class="fas fa-file-contract"></i> Dịch vụ Cho thuê</a
            >
          </li>
          <li class="menu-item">
            <a href="#"><i class="fas fa-tools"></i> Dịch vụ Sửa chữa</a>
          </li>
          <li class="menu-item">
            <a href="#"><i class="fas fa-users"></i> Quản lý Nhân sự</a>
          </li>
          <li class="menu-item">
            <a href="#"
              ><i class="fas fa-money-bill-wave"></i> Thanh toán & CSKH</a
            >
          </li>
        </ul>

        <div class="sidebar-footer">
          <a href="admin-login.html" id="btnLogout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Thoát
          </a>
        </div>
      </aside>

      <div class="main-wrapper">
        <header class="header">
          <div class="header-left">
            <h2 class="page-title">Tổng quan hệ thống</h2>
          </div>
          <div class="header-right">
            <div class="admin-profile">
              <img
                src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff"
                alt="Avatar"
                class="avatar"
              />
              <span class="admin-name">Xin chào, Admin!</span>
            </div>
          </div>
        </header>

        <main class="content">
          <div class="welcome-box">
            <h3>Chào mừng bạn đến với Bảng điều khiển!</h3>
            <p>
              Hãy chọn một chức năng ở thanh menu bên trái để bắt đầu làm việc.
            </p>
          </div>
        </main>
      </div>
    </div>

    <script>
      document
        .getElementById("btnLogout")
        .addEventListener("click", function (e) {
          e.preventDefault(); // Ngăn hành vi bấm link mặc định

          // 1. Xóa cờ đăng nhập khỏi bộ nhớ
          localStorage.removeItem("isAdminLoggedIn");

          // 2. Chuyển về trang login bằng lệnh replace()
          // Vì dùng replace(), người dùng bấm nút Back trên trình duyệt sẽ KHÔNG THỂ quay lại trang dashboard này được nữa.
          window.location.replace("admin-login.html");
        });
    </script>
  </body>
</html>
